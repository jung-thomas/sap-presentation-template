bio: |
  Vitaliy focuses on all ways developers are collecting data and turning it into value using
  the SAP Business Technology Platform. His main interests are in big data and fast data
  technologies, IoT, analytics, and data visualization. Before joining SAP, he worked as a
  technology consultant in Europe and in the U.S. Vitaliy is a visiting lecturer at WSB
  University in Wrocław.
