bio: |
  Rekha is a Developer Advocate in the SAP Global Developer and Community Relations Team.
  Her focus topics are SAPUI5 and SAP Build on the SAP BTP Platform. Prior to this role, she
  has worked as a Developer for the SAP CRM and SAP ERP(EAM) modules in India and Germany.
  She is enthusiastic about improving the Developer Experience on SAP Platforms and
  Technologies by sharing her Knowledge and Expertise. In her free time she enjoys walks in
  the Nature and does cooking/baking activities.
