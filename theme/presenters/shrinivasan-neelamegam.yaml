bio: |
  As a Developer Advocate at SAP, Shrini will be focusing on SAP Build, CAP and SAP UI5. He
  has over 19 years of experience in the IT industry and joined SAP Labs India 7 years ago.
  Before Joining SAP, Shrini worked as Web Developer(Consultant) in the US East Coast
  region. He is dedicated to helping developers and businesses leverage the power of SAP
  solutions to drive innovation and achieve their goals. Beyond his professional life, he is
  a tennis enthusiast and takes a keen interest in keeping abreast of current affairs.
